<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer shadow/glow layer -->
  <circle cx="32" cy="33" r="29" fill="#1E499D" opacity="0.15"/>
  <!-- Main background circle -->
  <circle cx="32" cy="32" r="29" fill="#1E499D" stroke="#000" stroke-width="1.5"/>
  <!-- Dashed orbit ring -->
  <circle cx="32" cy="32" r="22" stroke="#6CBB56" stroke-width="1.5" stroke-dasharray="3.5 2.5" fill="none" opacity="0.9"/>
  <!-- Orbit node — top (green) -->
  <circle cx="32" cy="10" r="3.5" fill="#6CBB56" stroke="#fff" stroke-width="1.2"/>
  <!-- Orbit node — bottom-right (white accent) -->
  <circle cx="51" cy="43" r="2.5" fill="#fff" stroke="#6CBB56" stroke-width="1.2" opacity="0.85"/>
  <!-- Users icon: left head -->
  <circle cx="25" cy="26" r="4.5" fill="#fff"/>
  <!-- Users icon: right head -->
